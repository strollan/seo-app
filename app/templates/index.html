<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Competitor Report</title>
  <link rel="icon" type="image/png" href="/static/favicon.png?v=1">
  <link rel="icon" href="/static/favicon.ico?v=2" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png?v=2">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png?v=2">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v=2">
  <link rel="manifest" href="/static/site.webmanifest?v=2">

  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2f;
      --panel-2: #17213b;
      --border: rgba(255,255,255,0.08);
      --text: #edf3ff;
      --muted: #a6b3d1;
      --blue: #2e4d97;
      --blue-2: #4366c7;
      --accent: #29b36a;
      --shadow: 0 18px 45px rgba(0,0,0,0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(67,102,199,0.20), transparent 26%),
        linear-gradient(180deg, #0b1020, #0f1628);
      min-height: 100vh;
      padding: 28px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(180deg, rgba(18,26,47,0.98), rgba(13,20,36,0.98));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 28px 30px 18px;
      background: linear-gradient(90deg, #1a2f68, #223c87);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 108px;
      height: 108px;
      object-fit: contain;
      border-radius: 0;
      background: transparent;
      padding: 0;
      display: block;
      flex-shrink: 0;
      box-shadow: 0 3px 12px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0;
      font-size: 38px;
      line-height: 1.05;
      font-weight: 800;
    }

    .subtitle {
      margin-top: 8px;
      color: rgba(255,255,255,0.90);
      font-size: 16px;
      line-height: 1.55;
      max-width: 760px;
    }

    .body {
      padding: 26px 30px 30px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 10px;
    }

    .field {
      background: linear-gradient(180deg, rgba(23,33,59,0.96), rgba(16,24,42,0.96));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #b8c8f3;
      font-size: 12px;
      letter-spacing: 0.08em;
      font-weight: 800;
      text-transform: uppercase;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 14px;
      padding: 14px 15px;
      font-size: 15px;
      outline: none;
    }

    input[type="text"]::placeholder {
      color: #8fa3d2;
    }

    input[type="text"]:focus {
      border-color: rgba(67,102,199,0.8);
      box-shadow: 0 0 0 3px rgba(67,102,199,0.18);
    }

    .examples {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .cta {
      appearance: none;
      border: 0;
      color: white;
      background: linear-gradient(90deg, #2f6df6, #2abf78);
      border-radius: 14px;
      padding: 15px 22px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(47,109,246,0.25);
    }

    .note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 820px) {
      body {
        padding: 18px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .body {
        padding-left: 20px;
        padding-right: 20px;
      }

      h1 {
        font-size: 30px;
      }

      .logo {
        width: 84px;
        height: 84px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <div class="brand">
          {% if logo_url %}
            <img src="{{ logo_url }}" alt="Logo" class="logo">
          {% endif %}
          <div>
            <h1>SEO Competitor Report</h1>
            <div class="subtitle">
              AI-assisted comparison of key on-page SEO signals, keyword overlap, and opportunity gaps.
            </div>
          </div>
        </div>
      </div>

      <div class="body">
        <form action="/analyze" method="post">
          <div class="form-grid">
            <div class="field">
              <label for="url_1">Your Site</label>
              <input
                type="text"
                id="url_1"
                name="url_1"
                placeholder="cnn.com or https://cnn.com"
                required
              >
              <div class="examples">Example: thriveagency.com</div>
            </div>

            <div class="field">
              <label for="url_2">Competitor</label>
              <input
                type="text"
                id="url_2"
                name="url_2"
                placeholder="msnbc.com or https://msnbc.com"
                required
              >
              <div class="examples">Example: ontopvisibility.com</div>
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="cta">Analyze Pages</button>
            <div class="note">
              Pulls live title, meta description, H1, visible text, keyword overlap, and a simple scoring model.
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
